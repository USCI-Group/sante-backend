name: Create Track Grabfood Order Cronjob (Production)

on:
  workflow_dispatch:  # manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: SSH into EC2 and Create Track Grabfood Order Cronjob
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_PRODUCTION }}           # EC2 host address
          username: ubuntu       # EC2 username (e.g., ubuntu)
          key: ${{ secrets.EC2_SSH_KEY_PRODUCTION }}      
          script: |
            (crontab -l 2>/dev/null | grep -v 'curl -s http://localhost:8081/api/internal-grabfood/track-new-orders-cron'; echo "* 23,0-15 * * * curl -s http://localhost:8081/api/internal-grabfood/track-new-orders-cron") | crontab -
