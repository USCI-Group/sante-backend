name: Deploy Encore Cravee to EC2 (Staging)

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      - name: Install Encore CLI
        run: curl -L https://encore.dev/install.sh | bash

      - name: Build Docker Image with Encore
        run: /home/runner/.encore/bin/encore build docker --config infra.config.json cravee-backend:latest

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker Image to Docker Hub
        run: |
          docker tag cravee-backend:latest ${{ secrets.DOCKER_USERNAME }}/cravee-backend:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/cravee-backend:latest

      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY_STAGING }}
          source: "docker-compose.yml"
          target: "/home/ubuntu"

      - name: SSH into EC2 and Deploy App
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST_STAGING }}           # EC2 host address
          username: ubuntu       # EC2 username (e.g., ubuntu)
          key: ${{ secrets.EC2_SSH_KEY_STAGING }}      
          script: |
            # Login to Docker Hub
            echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

            # Remove all dangling images
            docker image prune -f

            # Pull the latest image
            docker pull ${{ secrets.DOCKER_USERNAME }}/cravee-backend:latest
            # Tag the pulled image without username
            docker tag ${{ secrets.DOCKER_USERNAME }}/cravee-backend:latest cravee-backend:latest

            # Set environment variables
            export ENV=staging
            export ORIGIN=${{ secrets.ORIGIN_STAGING }}
            export DB_USERNAME=${{ secrets.DB_USERNAME }}
            export DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            export JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY_STAGING }}
            export AWS_S3_BUCKET_NAME=${{ secrets.AWS_S3_BUCKET_NAME_STAGING }}
            export AWS_REGION=ap-southeast-1
            export AWS_ACCESS_KEY_ID=${{ secrets.AWS_ACCESS_KEY_ID }}
            export AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_SECRET_ACCESS_KEY }}
            export AWS_SES_SENDER_EMAIL=${{ secrets.AWS_SES_SENDER_EMAIL }}
            export AWS_SES_ACCESS_KEY_ID=${{ secrets.AWS_SES_ACCESS_KEY_ID }}
            export AWS_SES_ACCESS_KEY=${{ secrets.AWS_SES_ACCESS_KEY }}
            export FIREBASE_PRIVATE_KEY_ID=${{ secrets.FIREBASE_PRIVATE_KEY_ID }}
            export FIREBASE_PRIVATE_KEY_ID_PRETZLEY_MEMBERSHIP=${{ secrets.FIREBASE_PRIVATE_KEY_ID_PRETZLEY_MEMBERSHIP }}
            export CRAVEE_GOOGLE_AUTH_CLIENT_ID=${{ secrets.CRAVEE_GOOGLE_AUTH_CLIENT_ID }}

            # Stop and remove existing containers
            docker compose down

            # Start the new container
            docker compose up -d
            docker ps

            # Check if any container is restarting
            RESTARTING_CONTAINERS=$(docker ps --filter "status=restarting" -q)

            if [ -n "$RESTARTING_CONTAINERS" ]; then
              echo "❌ One or more containers failed to start and are restarting:"
              docker ps --filter "status=restarting"
              exit 1
            fi

            # Set Docker to restart on boot
            docker update --restart unless-stopped $(docker ps -q)